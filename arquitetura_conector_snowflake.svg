<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#edf3ff" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b6bcb" />
      <stop offset="100%" stop-color="#00a6a6" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b667a" />
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #10203a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #3e4d67; }
      .box { fill: #ffffff; stroke: #b9c7de; stroke-width: 2; rx: 16; }
      .box-soft { fill: #f6f9ff; stroke: #c9d6ea; stroke-width: 2; rx: 16; }
      .box-green { fill: #effdf7; stroke: #8dd9ba; stroke-width: 2; rx: 16; }
      .box-orange { fill: #fff7ef; stroke: #f2bf8a; stroke-width: 2; rx: 16; }
      .box-gray { fill: #f4f6fa; stroke: #c8d0df; stroke-width: 2; rx: 16; }
      .head { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #1a2f51; }
      .text { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #3f4f68; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #4f5f77; }
      .legend { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #3b4861; }
      .arrow { stroke: #5b667a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-dash { stroke: #7b88a1; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="980" fill="url(#bg)" />
  <rect x="40" y="32" width="1320" height="84" rx="20" fill="url(#brand)" opacity="0.10" stroke="#90bfe9" stroke-width="1.5" />

  <text x="70" y="78" class="title">Triggo.ai Snowflake Sink Connector - Arquitetura Atual</text>
  <text x="70" y="104" class="subtitle">Suporte a Flat JSON, Debezium JSON (com e sem schema), AVRO e modos STAGE/SNOWPIPE_STREAMING</text>

  <rect x="120" y="160" width="1160" height="360" class="box-soft" />
  <text x="148" y="192" class="small">Kafka Connect Runtime</text>

  <rect x="560" y="210" width="280" height="72" class="box" />
  <text x="700" y="242" text-anchor="middle" class="head">SnowflakeSinkTask</text>
  <text x="700" y="264" text-anchor="middle" class="text">Buffer + Flush + Orquestracao</text>

  <rect x="140" y="210" width="250" height="72" class="box-gray" />
  <text x="265" y="242" text-anchor="middle" class="head">Kafka Topic</text>
  <text x="265" y="264" text-anchor="middle" class="text">records CDC</text>

  <rect x="500" y="320" width="400" height="64" class="box" />
  <text x="700" y="348" text-anchor="middle" class="head">AutoParser</text>
  <text x="700" y="370" text-anchor="middle" class="text">deteccao automatica do formato</text>

  <rect x="160" y="420" width="250" height="72" class="box" />
  <text x="285" y="452" text-anchor="middle" class="head">FlatJsonParser</text>
  <text x="285" y="474" text-anchor="middle" class="text">payload plano + pk.fields</text>

  <rect x="440" y="420" width="250" height="72" class="box" />
  <text x="565" y="452" text-anchor="middle" class="head">DebeziumJsonParser</text>
  <text x="565" y="474" text-anchor="middle" class="text">com e sem schema</text>

  <rect x="720" y="420" width="250" height="72" class="box" />
  <text x="845" y="452" text-anchor="middle" class="head">AvroParser</text>
  <text x="845" y="474" text-anchor="middle" class="text">logical types normalizados</text>

  <rect x="1000" y="420" width="250" height="72" class="box-gray" />
  <text x="1125" y="452" text-anchor="middle" class="head">ParsedRecord</text>
  <text x="1125" y="474" text-anchor="middle" class="text">fields + op + metadados KFK_</text>

  <rect x="90" y="600" width="560" height="220" class="box-green" />
  <text x="120" y="632" class="head">Modo A - SNOWPIPE_STREAMING</text>

  <rect x="120" y="660" width="250" height="70" class="box" />
  <text x="245" y="690" text-anchor="middle" class="head">SnowpipeStreamingWriter</text>
  <text x="245" y="712" text-anchor="middle" class="text">insert direto em TABELA_INGEST</text>

  <rect x="390" y="660" width="230" height="70" class="box" />
  <text x="505" y="690" text-anchor="middle" class="head">InlineProcessor</text>
  <text x="505" y="712" text-anchor="middle" class="text">MERGE assincrono por lote</text>

  <text x="120" y="766" class="text">- job.interval.seconds controla frequencia do MERGE</text>
  <text x="120" y="790" class="text">- merge.batch.size controla volume por execucao</text>
  <text x="120" y="814" class="text">- ingest.cleanup.delay.seconds controla retencao da _INGEST</text>

  <rect x="750" y="600" width="560" height="220" class="box-orange" />
  <text x="780" y="632" class="head">Modo B - STAGE</text>

  <rect x="780" y="660" width="260" height="70" class="box" />
  <text x="910" y="690" text-anchor="middle" class="head">StageCopyWriter</text>
  <text x="910" y="712" text-anchor="middle" class="text">upload JSON + COPY INTO _INGEST</text>

  <rect x="1060" y="660" width="220" height="70" class="box" />
  <text x="1170" y="690" text-anchor="middle" class="head">InlineProcessor</text>
  <text x="1170" y="712" text-anchor="middle" class="text">processBlock sincronico</text>

  <text x="780" y="766" class="text">- aplicacao de c/r/u/d na tabela final no mesmo flush</text>
  <text x="780" y="790" class="text">- cleanup por blockId + cleanup de expirados</text>
  <text x="780" y="814" class="text">- ingest.cleanup.delay.seconds controla retencao da _INGEST</text>

  <rect x="540" y="860" width="320" height="72" class="box-gray" />
  <text x="700" y="892" text-anchor="middle" class="head">Snowflake</text>
  <text x="700" y="914" text-anchor="middle" class="text">TABELA_INGEST -> MERGE -> TABELA_FINAL</text>

  <path d="M390 246 L560 246" class="arrow" />
  <path d="M700 282 L700 320" class="arrow" />
  <path d="M700 384 L285 420" class="arrow" />
  <path d="M700 384 L565 420" class="arrow" />
  <path d="M700 384 L845 420" class="arrow" />
  <path d="M970 456 L1000 456" class="arrow" />

  <path d="M1125 492 L245 660" class="arrow" />
  <path d="M1125 492 L505 660" class="arrow" />
  <path d="M1125 492 L910 660" class="arrow" />
  <path d="M1125 492 L1170 660" class="arrow" />

  <path d="M505 730 L640 860" class="arrow" />
  <path d="M1170 730 L760 860" class="arrow" />

  <path d="M700 860 L700 820" class="arrow-dash" />
  <text x="712" y="840" class="legend">cleanup controlado por ingest.cleanup.delay.seconds</text>

  <rect x="92" y="910" width="18" height="10" fill="#ffffff" stroke="#7b88a1" stroke-width="1.5" />
  <text x="118" y="920" class="legend">Componentes principais</text>
  <line x1="300" y1="916" x2="350" y2="916" class="arrow" />
  <text x="360" y="920" class="legend">Fluxo de dados</text>
  <line x1="490" y1="916" x2="540" y2="916" class="arrow-dash" />
  <text x="550" y="920" class="legend">Fluxo de cleanup</text>
</svg>
